syntax = "proto3";

package vryndara;

message AgentInfo {
    string id = 1;
    repeated string capabilities = 2;
    string status = 3;
}

message Signal {
    string id = 1;
    string source_agent_id = 2;
    string target_agent_id = 3;
    string type = 4;
    string payload = 5;
    int64 timestamp = 6;
}

message Ack {
    bool success = 1;
    string error = 2;
}

// --- NEW: Spatial & Vision Data ---
message SpatialRequest {
    string session_id = 1;
    string object_id = 2;      // The 3D object being interacted with
    string gesture = 3;        // e.g., "PINCH", "SWIPE_LEFT"
    float x = 4;
    float y = 5;
    float z = 6;
}

message HologramCommand {
    string action = 1;         // "SPAWN", "ROTATE", "MOVE"
    string target_object = 2;
    float x = 3;
    float y = 4;
    float z = 5;
}

// --- NEW: Hardware Node Management (For Phase 3) ---
message NodeHeartbeat {
    string node_id = 1;
    float cpu_usage = 2;
    float ram_usage = 3;
    bool on_battery = 4;
    int32 battery_level = 5;
}

// --- Workflow Definitions ---
message WorkflowStep {
    string agent_id = 1;
    string task_payload = 2;
    int32 step_order = 3;
}

message WorkflowRequest {
    string workflow_id = 1;
    repeated WorkflowStep steps = 2;
}

service Kernel {
    // Standard Agent routing
    rpc Register (AgentInfo) returns (Ack);
    rpc Publish (Signal) returns (Ack);
    rpc Subscribe (AgentInfo) returns (stream Signal);
    rpc ExecuteWorkflow (WorkflowRequest) returns (Ack);
    
    // NEW: Real-time streams for the 3D Engine
    rpc StreamSpatialData (stream SpatialRequest) returns (stream HologramCommand);
    rpc NodePing (NodeHeartbeat) returns (Ack);
}